<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPL Registration Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark-blue: #000080; --light-blue: #e3effb; --gold: #FFD700; --green: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--light-blue); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .container { width: 100%; max-width: 800px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 25px rgba(0,0,0,0.2); }
        
        .header { background-color: var(--dark-blue); color: white; padding: 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .header img { width: 60px; height: auto; border-radius: 5px; }
        .header-title h1 { font-size: 18px; margin: 0; }
        .entry-fee { color: var(--gold); font-size: 16px; font-weight: bold; }

        .form-content { padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        /* মোবাইল ভিউতে ইমেইল আর ঠিকানাকে ফুল উইডথ করার জন্য */
        .full-width { grid-column: span 2; }

        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #333; }
        .input-with-icon { display: flex; align-items: center; border: 1.5px solid #ccc; border-radius: 6px; overflow: hidden; height: 45px; }
        .input-with-icon i { background: var(--dark-blue); color: white; padding: 12px; width: 20px; text-align: center; }
        .input-with-icon input { border: none; padding: 10px; width: 100%; outline: none; font-size: 14px; }

        .section-banner { background: #d1e3ff; padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 15px; font-size: 15px; }

        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .upload-box { border: 2px dashed #a5c7fe; border-radius: 10px; min-height: 150px; text-align: center; background: #f9fbff; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .upload-box i { font-size: 30px; color: var(--dark-blue); }
        .upload-box input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
        
        .preview-img { width: 100%; max-height: 100px; object-fit: contain; margin-top: 5px; display: none; border-radius: 5px; }

        .copy-btn { background: #000; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }

        .submit-btn { background: var(--green); color: white; border: none; padding: 15px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 10px; }
        
        .club-footer { text-align: center; padding: 20px; border-top: 1px solid #eee; }
        .club-footer img { width: 40px; }

        @media (max-width: 600px) { 
            .grid, .upload-grid { grid-template-columns: 1fr; }
            .input-group { grid-column: span 1 !important; } /* মোবাইলে সব ফুল উইডথ */
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="HPL.jpeg" alt="Logo">
        <div class="header-title">
            <h1>HPL সিজন ৩ নিবন্ধন</h1>
        </div>
        <div class="entry-fee">ফি: ৪,৯৯৯/-</div>
    </div>

    <form id="registrationForm" class="form-content">
        <div class="grid">
            <div class="input-group"><label>১. দলের নাম</label><div class="input-with-icon"><i class="fas fa-users"></i><input type="text" id="teamName" required></div></div>
            <div class="input-group"><label>২. ম্যানেজার</label><div class="input-with-icon"><i class="fas fa-user"></i><input type="text" id="managerName" required></div></div>
            
            <div class="input-group full-width"><label>৫. ঠিকানা</label><div class="input-with-icon"><i class="fas fa-map-marker-alt"></i><input type="text" id="address" required></div></div>
            <div class="input-group full-width"><label>৬. ইমেইল</label><div class="input-with-icon"><i class="fas fa-envelope"></i><input type="email" id="email" required></div></div>
            <div class="input-group full-width"><label>৭. মোবাইল</label><div class="input-with-icon"><i class="fas fa-phone-alt"></i><input type="tel" id="phone" required></div></div>
        </div>

        <div class="section-banner">নথি আপলোড:</div>

        <div class="upload-grid">
            <div class="upload-box">
                <i class="fas fa-image"></i>
                <p>৩. দলের লোগো</p>
                <img id="logoPreview" class="preview-img">
                <input type="file" id="teamLogo" accept="image/*" required onchange="previewFile(this, 'logoPreview')">
            </div>

            <div class="upload-box">
                <i class="fas fa-copy"></i>
                <p>বিকাশ: 01778893276 <button type="button" onclick="copyNumber()" class="copy-btn">Copy</button></p>
                <p>৪. পেমেন্ট স্ক্রিনশট</p>
                <img id="paymentPreview" class="preview-img">
                <input type="file" id="paymentScreenshot" accept="image/*" required onchange="previewFile(this, 'paymentPreview')">
            </div>
        </div>

        <div style="margin: 15px 0;"><input type="checkbox" required> আমি সকল শর্ত মেনে নিচ্ছি।</div>
        <button type="submit" class="submit-btn" id="submitBtn">সাবমিট করুন</button>
    </form>

    <div class="club-footer">
        <img src="club.jpeg" alt="Club">
        <p>হিরাপুর আদর্শ ক্লাব</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbf7PgS04TLpdIjmwNC8SsPBukdzTz-1k",
        authDomain: "hpl-tournament-c4a98.firebaseapp.com",
        projectId: "hpl-tournament-c4a98",
        storageBucket: "hpl-tournament-c4a98.firebasestorage.app",
        messagingSenderId: "359588528623",
        appId: "1:359588528623:web:3a242e95502f6a503ef61a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const imgbbKey = "57a765cdd4134c205edb5710071a8432";

    window.previewFile = function(input, previewId) {
        const file = input.files[0];
        const preview = document.getElementById(previewId);
        if (file) {
            const reader = new FileReader();
            reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; }
            reader.readAsDataURL(file);
        }
    }

    window.copyNumber = function() {
        const num = "01778893276";
        navigator.clipboard.writeText(num).then(() => alert("নাম্বার কপি হয়েছে: " + num))
        .catch(() => {
            const t = document.createElement("textarea"); t.value = num; document.body.appendChild(t);
            t.select(); document.execCommand("copy"); document.body.removeChild(t);
            alert("নাম্বার কপি হয়েছে: " + num);
        });
    }

    async function upload(file) {
        const fd = new FormData(); fd.append("image", file);
        const r = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, {method:"POST", body:fd});
        const d = await r.json(); return d.data.url;
    }

    document.getElementById('registrationForm').onsubmit = async (e) => {
        e.preventDefault();
        const b = document.getElementById('submitBtn'); b.innerText = "অপেক্ষা করুন..."; b.disabled = true;
        try {
            const lUrl = await upload(document.getElementById('teamLogo').files[0]);
            const pUrl = await upload(document.getElementById('paymentScreenshot').files[0]);
            await addDoc(collection(db, "registrations"), {
                teamName: document.getElementById('teamName').value,
                manager: document.getElementById('managerName').value,
                address: document.getElementById('address').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                logoUrl: lUrl, paymentScreenshot: pUrl, timestamp: new Date()
            });
            alert("সফল হয়েছে!"); location.reload();
        } catch (err) { alert("ভুল হয়েছে!"); b.innerText = "সাবমিট করুন"; b.disabled = false; }
    };
</script>
</body>
</html>
