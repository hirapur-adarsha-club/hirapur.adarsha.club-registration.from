<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPL Registration Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark-blue: #000080; --light-blue: #e3effb; --gold: #FFD700; --green: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light-blue); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 800px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 25px rgba(0,0,0,0.2); }
        
        .header { background-color: var(--dark-blue); color: white; padding: 20px 30px; display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .header img { width: 70px; height: auto; border-radius: 5px; flex-shrink: 0; }
        .header-title { flex-grow: 1; text-align: left; }
        .header-title h1 { font-size: 20px; margin: 0; }
        .header-title p { margin: 5px 0 0; font-size: 13px; opacity: 0.8; }
        .entry-fee { color: var(--gold); font-size: 18px; font-weight: bold; white-space: nowrap; }

        .form-content { padding: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #333; }
        .input-with-icon { display: flex; align-items: center; border: 1.5px solid #ccc; border-radius: 6px; overflow: hidden; }
        .input-with-icon i { background: var(--dark-blue); color: white; padding: 12px; width: 20px; text-align: center; }
        .input-with-icon input { border: none; padding: 10px; width: 100%; outline: none; font-size: 14px; }

        .section-banner { background: #d1e3ff; padding: 12px; border-radius: 5px; font-weight: bold; margin-bottom: 20px; color: #000; font-size: 16px; }

        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .upload-box { border: 2px dashed #a5c7fe; border-radius: 10px; min-height: 160px; text-align: center; background: #f9fbff; cursor: pointer; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .upload-box i { font-size: 35px; color: var(--dark-blue); margin-bottom: 10px; }
        .upload-box p { font-size: 14px; font-weight: bold; margin: 5px 0; }
        .upload-box span { font-size: 12px; color: #666; }
        .upload-box input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; z-index: 2; }
        
        .preview-img { width: 100%; max-height: 120px; object-fit: contain; margin-top: 10px; display: none; border-radius: 5px; border: 1px solid #ddd; }

        .copy-btn { background: #000; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-left: 5px; }

        .terms { margin-bottom: 25px; display: flex; align-items: center; font-size: 14px; font-weight: bold; }
        .terms input { margin-right: 10px; transform: scale(1.2); }

        .submit-btn { background: var(--green); color: white; border: none; padding: 15px; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; width: 50%; margin-left: 50%; transition: 0.3s; }
        
        .club-footer { text-align: center; padding: 25px; border-top: 1px solid #eee; background: #fdfdfd; }
        .club-footer img { width: 40px; margin-bottom: 10px; }

        @media (max-width: 600px) { 
            .grid, .upload-grid { grid-template-columns: 1fr; } 
            .header { flex-direction: column; text-align: center; }
            .submit-btn { width: 100%; margin-left: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="HPL.jpeg" alt="HPL Logo">
        <div class="header-title">
            <h1>হিরাপুর প্রিমিয়ার লিগ - সিজন ৩ নিবন্ধন</h1>
            <p>অনুগ্রহ করে নিচের তথ্যগুলো সঠিকভাবে পূরণ করুন।</p>
        </div>
        <div class="entry-fee">ফি: ৪,৯৯৯/-</div>
    </div>

    <form id="registrationForm" class="form-content">
        <div class="grid">
            <div class="input-group">
                <label>১. দলের নাম</label>
                <div class="input-with-icon"><i class="fas fa-users"></i><input type="text" id="teamName" placeholder="দলের নাম" required></div>
            </div>
            <div class="input-group">
                <label>২. ম্যানেজার / মালিক</label>
                <div class="input-with-icon"><i class="fas fa-user"></i><input type="text" id="managerName" placeholder="মালিকের নাম" required></div>
            </div>
        </div>

        <div class="section-banner">নিবন্ধনের জন্য প্রয়োজনীয় নথি:</div>

        <div class="upload-grid">
            <div class="upload-box">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>৩. দলের লোগো</p>
                <span>PNG/JPG আপলোড করুন</span>
                <img id="logoPreview" class="preview-img">
                <input type="file" id="teamLogo" accept="image/*" required onchange="previewFile(this, 'logoPreview')">
            </div>

            <div class="upload-box" id="paymentBox">
                <i class="fas fa-file-invoice-dollar"></i>
                <p>বিকাশ: <span id="num">01778893276</span> <button type="button" onclick="copyNumber()" class="copy-btn">Copy</button></p>
                <p>৪. পেমেন্ট স্ক্রিনশট</p>
                <img id="paymentPreview" class="preview-img">
                <input type="file" id="paymentScreenshot" accept="image/*" required onchange="previewFile(this, 'paymentPreview')">
            </div>
        </div>

        <div class="grid">
            <div class="input-group"><label>৫. ঠিকানা</label><div class="input-with-icon"><i class="fas fa-map-marker-alt"></i><input type="text" id="address" placeholder="এলাকা" required></div></div>
            <div class="input-group"><label>৬. ইমেইল</label><div class="input-with-icon"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="mail@example.com" required></div></div>
            <div class="input-group" style="grid-column: span 2;"><label>৭. মোবাইল</label><div class="input-with-icon"><i class="fas fa-phone-alt"></i><input type="tel" id="phone" placeholder="০১৮XXXXXXXX" required></div></div>
        </div>

        <div class="terms"><input type="checkbox" required> আমি সকল শর্তাবলী মেনে নিচ্ছি।</div>
        <button type="submit" class="submit-btn" id="submitBtn">সাবমিট করুন</button>
    </form>

    <div class="club-footer">
        <img src="club.jpeg" alt="Club Logo">
        <p>আয়োজনে: হিরাপুর আদর্শ ক্লাব</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCbf7PgS04TLpdIjmwNC8SsPBukdzTz-1k",
        authDomain: "hpl-tournament-c4a98.firebaseapp.com",
        projectId: "hpl-tournament-c4a98",
        storageBucket: "hpl-tournament-c4a98.firebasestorage.app",
        messagingSenderId: "359588528623",
        appId: "1:359588528623:web:3a242e95502f6a503ef61a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const imgbbKey = "57a765cdd4134c205edb5710071a8432";

    // Image Preview Function
    window.previewFile = function(input, previewId) {
        const file = input.files[0];
        const preview = document.getElementById(previewId);
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }

    // Copy Number Function
    window.copyNumber = function() {
        const number = "01778893276";
        navigator.clipboard.writeText(number).then(() => {
            alert("নাম্বার কপি হয়েছে: " + number);
        }).catch(() => {
            const el = document.createElement('textarea');
            el.value = number;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("নাম্বার কপি হয়েছে: " + number);
        });
    }

    async function uploadImage(file) {
        const formData = new FormData();
        formData.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
        const data = await res.json();
        return data.data.url;
    }

    document.getElementById('registrationForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "অপেক্ষা করুন...";
        btn.disabled = true;

        try {
            const logoFile = document.getElementById('teamLogo').files[0];
            const payFile = document.getElementById('paymentScreenshot').files[0];

            const logoUrl = await uploadImage(logoFile);
            const paymentUrl = await uploadImage(payFile);

            await addDoc(collection(db, "registrations"), {
                teamName: document.getElementById('teamName').value,
                manager: document.getElementById('managerName').value,
                address: document.getElementById('address').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                logoUrl: logoUrl,
                paymentScreenshot: paymentUrl,
                timestamp: new Date()
            });

            alert("নিবন্ধন সফল হয়েছে!");
            location.reload();
        } catch (error) {
            console.error(error);
            alert("ভুল হয়েছে! আবার চেষ্টা করুন।");
            btn.innerText = "সাবমিট করুন";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
